# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck deploy scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck deploy/fetch_sources.sh
          shellcheck deploy/foundation_validate.sh
          shellcheck deploy/backfill_hashes.sh

      - name: TOML syntax check
        run: |
          python3 -c "
          import tomllib, pathlib, sys
          errors = 0
          for f in sorted(pathlib.Path('.').rglob('*.toml')):
              try:
                  tomllib.loads(f.read_text())
              except Exception as e:
                  print(f'FAIL: {f}: {e}')
                  errors += 1
          print(f'{errors} TOML error(s)' if errors else 'All TOML files valid')
          sys.exit(1 if errors else 0)
          "

      - name: Validate thread index completeness
        run: |
          python3 -c "
          import tomllib, pathlib, sys
          idx = tomllib.loads(pathlib.Path('lineage/THREAD_INDEX.toml').read_text())
          threads = idx.get('threads', [])
          missing = []
          for t in threads:
              tid = t.get('id', '')
              src = t.get('data_sources', '')
              tgt = t.get('data_targets', '')
              if src and not pathlib.Path(src).exists():
                  missing.append(f'Thread {tid}: missing source {src}')
              if tgt and not pathlib.Path(tgt).exists():
                  missing.append(f'Thread {tid}: missing target {tgt}')
              ml_src = t.get('ml_data_sources', '')
              ml_tgt = t.get('ml_data_targets', '')
              if ml_src and not pathlib.Path(ml_src).exists():
                  missing.append(f'Thread {tid}: missing ML source {ml_src}')
              if ml_tgt and not pathlib.Path(ml_tgt).exists():
                  missing.append(f'Thread {tid}: missing ML target {ml_tgt}')
          for m in missing:
              print(f'WARN: {m}')
          if missing:
              sys.exit(1)
          print(f'{len(threads)} threads indexed, all manifests present')
          "

      - name: Data manifest hash coverage
        run: |
          python3 -c "
          import tomllib, pathlib, sys
          total_hashed = 0
          total_sources = 0
          total_empty_fetchable = 0
          for f in sorted(pathlib.Path('data/sources').glob('*.toml')):
              data = tomllib.loads(f.read_text())
              sources = data.get('source', data.get('sources', []))
              if not isinstance(sources, list):
                  continue
              hashed = 0
              empty = 0
              for s in sources:
                  if not isinstance(s, dict):
                      continue
                  total_sources += 1
                  if s.get('blake3', ''):
                      hashed += 1
                      total_hashed += 1
                  else:
                      empty += 1
              print(f'{f.name}: {hashed}/{hashed + empty} hashed')
          pct = (total_hashed / total_sources * 100) if total_sources > 0 else 0
          print(f'Overall: {total_hashed}/{total_sources} ({pct:.0f}%)')
          # Fail if hash coverage drops below current baseline (informational until backfill)
          # When sources are fetched and hashed, raise this threshold
          if total_sources > 0 and pct < 0:
              print('::error::Hash coverage below threshold')
              sys.exit(1)
          "
